debug=false
logging.level.org.springframework.boot.autoconfigure=TRACE

management.endpoints.web.exposure.include=*

spring.application.name=MyFirstApp
logging.level.com.example.myfirstapp=INFO

spring.datasource.jdbc-url=jdbc:mysql://localhost:3306/test
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.test2.jdbc-url=jdbc:mysql://localhost:3306/sakila
spring.datasource.test2.username=root
spring.datasource.test2.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

kafka.cluster1.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094
kafka.cluster2.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Retry configuration
resilience4j.retry.instances.externalApiRetry.max-attempts=2
resilience4j.retry.instances.externalApiRetry.wait-duration=2s
resilience4j.retry.instances.externalApiRetry.enable-exponential-backoff=true
resilience4j.retry.instances.externalApiRetry.exponential-backoff-multiplier=2

# Exceptions that should trigger retry
resilience4j.retry.instances.externalApiRetry.retry-exceptions[0]=org.springframework.web.client.RestClientResponseException